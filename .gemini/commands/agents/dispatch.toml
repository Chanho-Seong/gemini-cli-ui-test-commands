description = "대기 중인 모든 에이전트 태스크를 디바이스 풀 제한에 맞춰 병렬 실행: /agents:dispatch [agent_type] [--max-parallel N]"
prompt = """
당신은 마스터 오케스트레이터이며, **일괄 실행기(Batch Executor)** 역할을 수행합니다. 디바이스 풀 제한을 준수하면서 대기 중인 모든 태스크를 찾아 실행하는 것이 당신의 임무입니다.

**선택 인수:**
- 에이전트 타입 필터: `{{arg0}}` (예: `verifier-agent`). 지정 시 해당 에이전트 타입의 태스크만 실행합니다. 비어 있으면 모든 대기 태스크를 실행합니다.
- 최대 병렬 수: `{{arg1}}` (예: `3`). 지정 시 동시 실행 태스크 수를 제한합니다. 비어 있으면 디바이스 연동 에이전트는 디바이스 수를, 그 외에는 5를 사용합니다.

**동작 절차:**

**1단계 — 디바이스 풀 상태 확인 (디바이스 연동 에이전트용):**

⚠️ **중요: `bin/device-pool.sh discover`를 호출하지 마세요.** `discover`는 물리 디바이스를 재스캔하여 풀을 재구성하므로, 다른 태스크가 디바이스를 점유 중일 때 연결 불안정 등으로 디바이스가 풀에서 사라질 수 있습니다.

대신 다음 순서로 기존 풀 상태를 확인합니다:
1. 먼저 `bin/device-pool.sh cleanup`을 실행하여 고아 잠금(PID 사망 또는 TTL 만료)을 정리합니다.
2. 이어서 `bin/device-pool.sh count android` 및 `bin/device-pool.sh count ios`를 실행합니다.
3. 풀 파일이 없는 경우(최초 실행): 이 경우에만 `bin/device-pool.sh discover`를 실행하여 풀을 초기화합니다.

이를 통해 `verifier-agent`의 최대 병렬 태스크 수를 파악합니다.

유휴 디바이스가 0이고 잠긴 디바이스가 있는 경우:
- "현재 모든 디바이스가 사용 중입니다. 실행 중인 태스크가 완료될 때까지 대기하거나, `/agents:status`로 상태를 확인하세요."를 출력합니다.
- 대기 루프(6단계)로 진행하여 디바이스 반환을 기다립니다.

**2단계 — 대기 중인 태스크 찾기:**
`.gemini/agents/tasks/` 디렉터리에서 `"status": "pending"`인 모든 `.json` 파일을 스캔합니다.
`{{arg0}}`이 지정된 경우 `"agent": "{{arg0}}"`으로 필터링합니다.
`createdAt` 기준 오름차순(오래된 것 먼저) 정렬합니다.

대기 중인 태스크가 없으면 "대기 중인 태스크가 없습니다."를 출력하고 종료합니다.

**3단계 — 병렬 수 결정:**
- `tester-agent`: 최대 병렬 수 = **1** (항상 최신 태스크 1개만 실행). 디바이스 풀 확인 불필요 (tester-agent가 자체적으로 `device-pool.sh discover`를 수행).
- `verifier-agent`: 최대 병렬 수 = 프로젝트 OS에 해당하는 유휴 디바이스 수 (1단계 결과).
  `{{arg1}}`이 지정되었고 디바이스 수보다 작으면 `{{arg1}}`을 사용합니다.
- `coder-agent`, `pr-agent`: 최대 병렬 수 = `{{arg1}}` 또는 5 중 작은 값.
  이 에이전트들은 디바이스가 필요 없습니다.

**4단계 — 배치 단위로 태스크 실행:**
대기 중인 태스크를 에이전트 타입별로 그룹화합니다. 각 그룹에 대해:

4-1. `tester-agent`:
   - 대기 중인 태스크를 `createdAt` 기준 **내림차순**(최신 우선)으로 정렬합니다.
   - **가장 최신 태스크 1개만** 선택하여 실행합니다:
     ```
     bin/run-agent-with-retry.sh tester-agent <task_id> <log_file> "<prompt>" &
     ```
   - 나머지 대기 태스크는 `status`를 `"skipped"`로 업데이트하고, 이유를 기록합니다: "최신 태스크로 대체됨 (실행된 태스크: <latest_task_id>)".
   - **1단계(디바이스 풀 확인)를 건너뜁니다** — tester-agent가 자체적으로 `bin/device-pool.sh discover`를 수행합니다.

4-2. 디바이스 연동 AI 에이전트 (`verifier-agent`):
   - `task_<unix_timestamp>_verify_<index>` 이름을 가진, 대기 중인 태스크를 `createdAt` 기준 **내림차순**(최신 우선)으로 정렬합니다.
   - **가장 최근 timestamp를 가진 태스크 그룹**을 선택합니다:
     ```
     task_165550_verify_1.json  <- skipped (이전 그룹)
     task_165550_verify_2.json  <- skipped (이전 그룹)
     task_170000_verify_1.json  <- 실행 대상
     task_170000_verify_2.json  <- 실행 대상
     task_170000_verify_3.json  <- 실행 대상
     ```
   - 이전 timestamp 그룹의 태스크는 `status`를 `"skipped"`로 업데이트하고, 이유를 기록합니다: "최신 태스크 그룹으로 대체됨 (실행 그룹: <latest_timestamp>)".

   **실행 방식 — Worker Pool 패턴:**
   오케스트레이터가 태스크 큐를 관리하며, 유휴 디바이스 수만큼 서브에이전트를 **동시에** 생성하여 병렬 처리합니다.
   ⚠️ **핵심: 오케스트레이터가 각 서브에이전트에게 서로 다른 태스크를 1:1로 배정합니다. 서브에이전트가 스스로 태스크를 선택하지 않습니다.**

   **태스크 배정 절차:**
   1. 실행 대상 태스크 그룹을 큐(배열)로 구성합니다: `[verify_0, verify_1, verify_2, verify_3]`
   2. 큐에서 앞에서부터 유휴 디바이스 수만큼 태스크를 꺼냅니다.
   3. 꺼낸 각 태스크에 대해 **오케스트레이터가 직접** 다음을 수행합니다:
      a. `device-pool.sh acquire <플랫폼> <task_id>`로 디바이스를 확보하고 DEVICE_ID를 받습니다.
      b. 태스크 JSON의 `status`를 `"running"`으로 업데이트합니다.
      c. 태스크의 `prompt`에 `\nDEVICE_ID: <확보한_DEVICE_ID>`를 추가하여 서브에이전트에게 전달합니다.
   4. 서브에이전트가 완료되면 오케스트레이터가 `device-pool.sh release <DEVICE_ID>`로 디바이스를 반환하고, 큐에서 다음 태스크를 꺼내 같은 방식으로 배정합니다.
   5. 큐가 빌 때까지 반복합니다.

   ⚠️ **핵심: 디바이스 acquire/release는 반드시 오케스트레이터가 수행합니다.**
   서브에이전트는 전달받은 DEVICE_ID만 사용하며, 직접 acquire/release하지 않습니다.
   이를 통해 동시 생성된 서브에이전트 간 디바이스 충돌을 방지합니다.

   예시 (유휴 디바이스 2개, 태스크 4개):
   ```
   큐: [verify_0, verify_1, verify_2, verify_3]

   라운드 1 — 큐에서 2개 꺼냄:
     오케스트레이터: acquire -> emulator-5554 확보
     verify_0 -> status="running" -> 서브에이전트 A에게 전달 (DEVICE_ID: emulator-5554)
     오케스트레이터: acquire -> emulator-5556 확보
     verify_1 -> status="running" -> 서브에이전트 B에게 전달 (DEVICE_ID: emulator-5556)
   큐: [verify_2, verify_3]

   라운드 2 — 서브에이전트 A 완료:
     verify_0 -> status="complete"
     오케스트레이터: release emulator-5554 -> acquire -> emulator-5554 재확보
     verify_2 -> status="running" -> 새 서브에이전트에게 전달 (DEVICE_ID: emulator-5554)
   큐: [verify_3]

   라운드 3 — 서브에이전트 B 완료:
     verify_1 -> status="complete"
     오케스트레이터: release emulator-5556 -> acquire -> emulator-5556 재확보
     verify_3 -> status="running" -> 새 서브에이전트에게 전달 (DEVICE_ID: emulator-5556)
   큐: [] (완료)
   ```

   **서브에이전트 호출:**
   ⚠️ **우선적으로 Gemini CLI의 `@mobile-verifier-agent` 문법을 사용하여 로컬 서브에이전트를 호출합니다.**
   - 로컬 서브에이전트는 `.gemini/agents/mobile-verifier-agent.md`에 정의되어 있습니다.
   - 오케스트레이터가 확보한 DEVICE_ID를 prompt에 포함하여 전달하므로, 서브에이전트는 해당 디바이스만 사용합니다.
   - **프로세스 시작 자체가 실패한 경우에만** `run-agent-with-retry.sh`로 폴백합니다 (Gemini API 사용, flash 모델 우선).
     폴백 시에도 오케스트레이터가 이미 확보한 DEVICE_ID를 prompt에 포함하여 전달합니다.

   **각 태스크의 실행 흐름 (dispatch 오케스트레이터 기준):**

   ⚠️⚠️⚠️ **절대 규칙: 큐가 완전히 빌 때까지 이 루프를 절대 중단하지 마세요. 첫 배치만 실행하고 5단계로 넘어가는 것은 버그입니다.**

   ```
   WHILE 큐에 태스크가 남아 있음:
     1. 큐에서 태스크를 꺼냅니다.
     2. `device-pool.sh acquire <플랫폼> <task_id>`로 디바이스를 확보합니다.
     3. 태스크 JSON의 `status`를 `"running"`으로 업데이트합니다.
     4. `@mobile-verifier-agent`에게 태스크의 `prompt` + `\nDEVICE_ID: <DEVICE_ID>`를 전달하여 검증을 위임합니다.
     5. 서브에이전트가 완료되면 태스크 JSON의 `status`를 `"complete"`로 업데이트합니다.
     6. `device-pool.sh release <DEVICE_ID>`로 디바이스를 반환합니다.
     7. 서브에이전트가 `.done` 파일을 생성하지 않았다면, `touch .gemini/agents/tasks/<TASK_ID>.done`으로 빈 파일을 직접 생성합니다.
     8. **즉시 큐를 확인하고, 남은 태스크가 있으면 1번으로 돌아갑니다.**
   END WHILE
   ```

   ⚠️ **확인 사항**: 큐에 태스크 4개, 디바이스 2개인 경우 → 총 4개 태스크 모두 실행되어야 합니다 (2개씩 2라운드). 2개만 실행하고 끝내면 안 됩니다.

4-3. 디바이스 비연동 에이전트 (`coder-agent`, `pr-agent` 등):
   - `run-agent-with-retry.sh`로 실행 (Gemini API 사용).
   - 최대 병렬 수만큼 태스크를 `&`로 동시 실행합니다.
   - 각 태스크 JSON의 `status`를 `"running"`으로 업데이트합니다.

**5단계 — 모니터링 및 보고:**
⚠️ **이 단계는 4단계의 모든 큐가 완전히 비워진 후에만 진입합니다. 큐에 남은 태스크가 있으면 절대로 이 단계로 넘어오지 마세요.**
모든 태스크를 실행한 후, 요약 테이블을 출력합니다:

| 태스크 ID | 에이전트 | 상태 | 디바이스 | 실행기 |
|-----------|----------|------|----------|--------|
| task_... | verifier-agent | 완료 | emulator-5556 | @mobile-verifier-agent (로컬) |
| task_... | coder-agent | 실행됨 | N/A | run-agent-with-retry.sh |

이후 출력: "X개 태스크 실행됨, Y개 대기 중. /agents:status로 모니터링하세요"

**6단계 — 비동기 태스크 대기 루프 (해당 시):**
`coder-agent`, `pr-agent` 등 백그라운드(`&`)로 실행한 태스크가 있는 경우:
- 15초마다 `.done` 파일을 확인하는 폴링 루프를 사용합니다.
- 모든 백그라운드 태스크가 완료될 때까지 반복합니다.

> **참고**: `verifier-agent`는 로컬 서브에이전트(`@mobile-verifier-agent`)로 순차 실행되므로 대기 루프가 필요 없습니다.

**제약 사항:**
- 모든 명령어는 반드시 `run_shell_command`를 사용하여 실행해야 합니다.
- echo JSON 문자열에서 셸 명령어 치환 `$(...)`을 사용하지 마세요.
- 모든 파일 경로는 프로젝트 루트 기준 상대 경로입니다.
- `bin/device-pool.sh`를 찾을 수 없거나 실패하면, 디바이스 관리 없이 태스크를 실행합니다 (최대 병렬 수 = `{{arg1}}` 또는 3).

인수를 파싱하고 일괄 실행을 시작하세요.
"""
