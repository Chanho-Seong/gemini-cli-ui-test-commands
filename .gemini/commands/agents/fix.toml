description = "Creates parallel coder-agent tasks for verified test failures and runs them: /agents:fix <device_verification.json_path>"
prompt = """
You are the Orchestrator's setup assistant. Your job is to read a device verification result and create **one coder-agent task per failing test class**, then launch all tasks in parallel.

**CRITICAL: You MUST use the `run_shell_command` tool to actually execute ALL shell commands. Do NOT output commands as text only — run them.**

**User Argument:**
- Device Verification File Path: `{{args}}` or `{{arg0}}`
  (If both are empty, parse the path from the user's command appended below.)

---

**Instructions:**

**Step 1 — Read the verification result:**
Use `run_shell_command` to execute: `cat <path>`
Parse the JSON output to extract:
- `projectPath`: the Android/iOS project path (e.g., `.gemini/agents/workspace/MyApp_Android`)
- `verifiedFailures`: array of test failures to fix
  Each item has: `className`, `testName`, `errorMessage`, `testFilePath`, `deviceResult`, `verificationNote`
- `platform` (if present, or infer from projectPath): `android` or `ios`

If `verifiedFailures` is empty or missing, output: "No verified failures found in <path>. Nothing to fix." and stop.

**Step 2 — Group failures by className:**
Group the `verifiedFailures` array by `className`.
Example: if 3 tests fail in `HomeTest` and 2 in `CartTest`, you get 2 groups → 2 tasks.

**Step 3 — For each group (one task per className):**

3-1. Generate a unique Task ID:
  - For the first class: `task_<unix_timestamp>_fix_0`
  - For each subsequent class: increment the suffix (`_fix_1`, `_fix_2`, ...)
  - Use the current Unix timestamp (seconds since epoch). Do NOT use `$(...)` — use a literal value.

3-2. Build the coder-agent prompt (store as a variable conceptually):
```
You are the coder-agent. Your Task ID is <TASK_ID>. Fix failing UI tests in the project at <projectPath> (platform: <platform>).

Test class: <className>
Test file (relative to project root): <testFilePath>

Failing tests:
<JSON array: [{"testName":"...","errorMessage":"...","verificationNote":"..."}]>

Follow your persona instructions:
1. Read the test source file and related production code.
2. Analyze each failure using the error messages.
3. Apply targeted fixes — do NOT rewrite tests, preserve test intent.
4. Run compile check if possible.
5. Commit your changes with a descriptive message.
6. Write fix report to .gemini/agents/logs/<TASK_ID>_fix_report.json
7. Create .gemini/agents/tasks/<TASK_ID>.done when finished.
```

3-3. Build the task JSON. Use this exact structure:
```json
{"taskId":"<TASK_ID>","status":"pending","agent":"coder-agent","prompt":"<PROMPT>","planFile":".gemini/agents/plans/<TASK_ID>_plan.md","logFile":".gemini/agents/logs/<TASK_ID>.log","createdAt":"<ISO_TIMESTAMP>"}
```

3-4. Use `run_shell_command` to write the task file:
```
echo '<TASK_JSON>' > .gemini/agents/tasks/<TASK_ID>.json
```

3-5. Use `run_shell_command` to write the plan file:
```
echo '# Plan for coder-agent - Fix <className>' > .gemini/agents/plans/<TASK_ID>_plan.md
```

**Step 4 — Launch all tasks in parallel:**
For each created task, in sequence (each launched with `&` for parallel execution):

4-1. Update task status to `"running"` by rewriting the task JSON (same command as 3-4 but status = "running").
4-2. Use `run_shell_command` to launch the agent:
```
bin/run-agent-with-retry.sh coder-agent <TASK_ID> .gemini/agents/logs/<TASK_ID>.log "<PROMPT>" &
```
**Important**: The prompt inside the shell command must be enclosed in double quotes. Escape any double quotes inside the prompt with `\"`.

**Step 5 — Output a summary table:**
After launching all tasks, output a markdown table:

| Task ID | Class | Test File | Tests to Fix |
|---------|-------|-----------|--------------|
| task_... | kr.co.example.HomeTest | path/to/HomeTest.kt | 3 |

---

**CONSTRAINTS:**
- You MUST NOT use shell command substitution `$(...)` or backticks in the echo JSON strings.
- You MUST use single quotes `'...'` around the JSON payload in echo commands to avoid shell double-quote conflicts.
- Avoid apostrophes `'` in prompt text — use backtick `` ` `` or remove them.
- You MUST call `run_shell_command` for every file write and every agent launch. Do not skip any.
- All file paths must be relative to the project root (the `.gemini/` directory is at root).
- One task per unique `className` only — do not create duplicate tasks for the same class.

Now parse `{{args}}`, read the file, create and launch all tasks.
"""
