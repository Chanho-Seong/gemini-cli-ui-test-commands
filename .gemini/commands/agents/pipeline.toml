description = "UITest 전체 파이프라인 실행: /agents:pipeline [--skip-fix] [--skip-pr] [--skip-verify] [--suite <name>] [--class <fqn>...] [--variant <name>] [--module <name>]"
prompt = """
당신은 마스터 오케스트레이터의 **파이프라인 컨트롤러**입니다. UITest 파이프라인을 단계별로 순차 실행하는 것이 당신의 역할입니다.

**사용자 인자:** `{{args}}`

---

## 1단계 — 인자 파싱 및 플랫폼 감지

### 1-1. 인자 파싱

`{{args}}`에서 다음 옵션을 파싱합니다:

- `--skip-fix`: 코드 수정(fix) 단계를 건너뜁니다
- `--skip-pr`: PR 생성 단계를 건너뜁니다
- `--skip-verify`: 디바이스 검증 단계를 건너뜁니다 (검증 없이 바로 fix로 진행)
- `--suite <name>`: 테스트 스위트 이름 (기본값: SanitySuite)
- `--class <fqn>`: 실행할 테스트 클래스 FQCN (여러 개 지정 가능)
- `--variant <name>`: Android 빌드 variant (기본값: googleBeta)
- `--module <name>`: Android 모듈명 (기본값: yogiyo)
- `--dry-run`: 실행하지 않고 계획만 출력

### 1-2. 워크스페이스 프로젝트 탐색 및 플랫폼 감지

`.gemini/agents/workspace/` 디렉토리 하위를 스캔하여 프로젝트 유형을 판별합니다:

```shell
ls -la .gemini/agents/workspace/
```

각 하위 디렉토리에 대해:

**Android 프로젝트 판별:**
```shell
ls .gemini/agents/workspace/<project_name>/build.gradle* 2>/dev/null
ls .gemini/agents/workspace/<project_name>/gradlew 2>/dev/null
```
- `build.gradle` 또는 `build.gradle.kts` 파일이 존재하면 → **Android**

**iOS 프로젝트 판별:**
```shell
ls .gemini/agents/workspace/<project_name>/*.xcworkspace 2>/dev/null
ls .gemini/agents/workspace/<project_name>/*.xcodeproj 2>/dev/null
```
- `*.xcworkspace` 또는 `*.xcodeproj` 파일이 존재하면 → **iOS**

감지된 플랫폼(`PLATFORM`)과 프로젝트 경로(`PROJECT_PATH`)를 이후 모든 단계에서 사용합니다.

워크스페이스에 프로젝트가 없으면 "워크스페이스에 프로젝트가 없습니다. `.gemini/agents/workspace/`에 프로젝트를 추가해주세요." 메시지를 출력하고 중단합니다.

여러 프로젝트가 존재하면 각각의 플랫폼을 표시하고, 사용자에게 어떤 프로젝트를 대상으로 할지 확인합니다.

### 1-3. Dry-run 처리

`--dry-run`이 지정된 경우, 감지된 플랫폼 정보와 함께 실행 계획만 출력하고 종료합니다:
```
[파이프라인 실행 계획]
플랫폼: <PLATFORM>
프로젝트: <PROJECT_PATH>
1. 테스트 실행: <플랫폼별 스크립트>
2. 검증 태스크 생성: /agents:verify <결과 파일>  (skip-verify 시 생략)
3. 검증 실행: /agents:run-all verifier-agent  (skip-verify 시 생략)
4. 코드 수정: /agents:fix <검증 결과>  (skip-fix 시 생략)
5. PR 생성: /agents:pr  (skip-pr 시 생략)
```

---

## 2단계 — 테스트 실행 (run-test)

감지된 플랫폼에 따라 적절한 테스트 스크립트를 실행합니다.

### Android 프로젝트인 경우:

1. `--suite` 옵션이 지정된 경우, 프로젝트 소스에서 스위트 파일을 찾아 테스트 클래스 목록을 추출합니다:
   - `*<suite_name>*.kt` 또는 `*<suite_name>*.java` 파일을 `androidTest/` 디렉토리에서 검색
   - `@Suite.SuiteClasses(...)` 어노테이션 내의 클래스 목록을 파싱
   - 추출된 각 FQCN을 `--class` 옵션으로 변환

2. `run-test-android.sh`를 실행합니다:
   ```shell
   cd .gemini/agents/workspace/<project_name> && ../../../../bin/run-test-android.sh --variant <variant> --module <module> [--class <fqn1> --class <fqn2> ...]
   ```

3. 실행 결과를 파싱합니다:
   ```shell
   python3 bin/parse-am-instrument-results.py --shard-dir .gemini/agents/workspace/<project_name>/test_results --output-dir .gemini/agents/logs
   ```

### iOS 프로젝트인 경우:

1. `--suite` 옵션이 지정된 경우, 프로젝트에서 해당 스위트와 관련된 테스트 타겟 또는 스킴을 검색합니다.

2. `--class`가 여러 개인 경우 각각에 대해 `run-test-ios.sh`를 실행합니다:
   ```shell
   bin/run-test-ios.sh task_<unix_timestamp>_test_<index> <test_class_fqn> --project .gemini/agents/workspace/<project_name>
   ```
   - `--class`와 `--suite` 모두 미지정 시, 전체 테스트를 실행합니다.
   - iOS는 클래스별로 별도의 task_id를 부여하여 개별 실행합니다.
   - `run-test-ios.sh`가 내부적으로 디바이스 풀 관리, xcodebuild 실행, xcresulttool 파싱, 결과 JSON 생성을 자동 처리합니다.

### 공통:

테스트 실행이 완료되면, 결과 파일 경로를 기록합니다:
- Android: `.gemini/agents/logs/all_uitest_results.json` 또는 생성된 결과 JSON
- iOS: `.gemini/agents/logs/<task_id>_uitest_results.json` (여러 개일 수 있음)

**결과 확인:** 실패한 테스트가 없으면 "모든 테스트가 통과했습니다. 파이프라인을 종료합니다." 출력 후 종료합니다.

---

## 3단계 — 검증 태스크 생성 (verify)

**`--skip-verify` 옵션이 지정된 경우 이 단계와 4단계를 건너뛰고 5단계로 진행합니다.**

2단계에서 생성된 결과 파일을 사용하여 검증 태스크를 생성합니다.

1. 결과 JSON 파일에서 `failedTests` 배열의 고유 `className`을 추출합니다.
2. 각 className별로 실패 테스트 메서드 목록을 수집합니다.
3. className별로 verifier-agent 태스크 JSON을 생성합니다:
   - Task ID: `task_<unix_timestamp>_verify_<index>`
   - 프롬프트에 `플랫폼: <PLATFORM>` 정보를 포함
   - 프롬프트에 실패 테스트 케이스 목록을 직접 포함
   - `.gemini/agents/tasks/<task_id>.json` 파일로 저장
   - `.gemini/agents/plans/<task_id>_plan.md` 파일 생성

생성된 태스크 요약 테이블을 출력합니다.

---

## 4단계 — 검증 실행 (run-all verifier-agent)

**`--skip-verify` 옵션이 지정된 경우 이 단계를 건너뜁니다.**

1. 디바이스를 탐색합니다:
   ```shell
   bin/device-pool.sh discover
   ```
   감지된 플랫폼에 맞는 디바이스 수를 조회합니다:
   - Android: `bin/device-pool.sh count android`
   - iOS: `bin/device-pool.sh count ios`

2. `.gemini/agents/tasks/` 디렉토리에서 `"status": "pending"`, `"agent": "verifier-agent"`인 태스크를 찾습니다.

3. 해당 플랫폼의 디바이스 수에 맞춰 병렬로 실행합니다:
   ```shell
   bin/run-agent-with-retry.sh verifier-agent <task_id> <log_file> "<prompt>" &
   ```

4. 모든 verifier-agent 태스크가 완료될 때까지 대기합니다 (`.done` 파일 모니터링, 15초 간격 폴링).

5. 검증 결과를 병합합니다:
   ```shell
   python3 bin/merge-verification-results.py --dir .gemini/agents/logs --output .gemini/agents/logs/pipeline_device_verification.json --aggregated <aggregated_file>
   ```

검증 결과에서 `verifiedFailures`가 비어 있으면 "모든 실패가 디바이스 환경 전용 문제입니다. 수정이 필요하지 않습니다." 출력 후 종료합니다.

---

## 5단계 — 코드 수정 (fix)

**`--skip-fix` 옵션이 지정된 경우 이 단계를 건너뛰고 6단계로 진행합니다.**

1. 검증 결과 파일 (또는 `--skip-verify` 시 테스트 결과 파일)에서 실패 항목을 className별로 그룹화합니다.

2. **`--skip-verify`인 경우:** 2단계의 테스트 결과 JSON에서 `failedTests`를 직접 사용합니다. 각 실패 항목에 `deviceResult: "SKIPPED"`, `verificationNote: "디바이스 검증 생략"` 속성을 추가하여 pass-through 검증 파일을 생성합니다:
   ```shell
   python3 -c "
   import json
   with open('<results_file>') as f: data = json.load(f)
   verification = {
       'platform': '<PLATFORM>',
       'projectPath': data.get('projectPath', ''),
       'verifiedFailures': data.get('failedTests', []),
       'verifiedPasses': []
   }
   for f in verification['verifiedFailures']:
       f['deviceResult'] = 'SKIPPED'
       f['verificationNote'] = '디바이스 검증 생략'
   with open('.gemini/agents/logs/pipeline_device_verification.json', 'w') as f:
       json.dump(verification, f, indent=2, ensure_ascii=False)
   "
   ```

3. className별로 coder-agent 태스크를 생성합니다:
   - Task ID: `task_<unix_timestamp>_fix_<index>`
   - 프롬프트에 `platform: <PLATFORM>` 정보를 포함
   - `.gemini/agents/tasks/<task_id>.json` 파일로 저장

4. 모든 coder-agent 태스크를 병렬로 실행합니다:
   ```shell
   bin/run-agent-with-retry.sh coder-agent <task_id> <log_file> "<prompt>" &
   ```

5. 모든 coder-agent 태스크가 완료될 때까지 대기합니다.

---

## 6단계 — PR 생성 (pr)

**`--skip-pr` 옵션이 지정된 경우 이 단계를 건너뜁니다.**

1. `.gemini/agents/logs/*_fix_report.json` 파일들을 수집합니다.
2. pr-agent 태스크를 생성합니다:
   - Task ID: `task_<unix_timestamp>_pr`
3. pr-agent를 실행합니다:
   ```shell
   bin/run-agent-with-retry.sh pr-agent <task_id> <log_file> "<prompt>" &
   ```
4. pr-agent 완료를 대기합니다.
5. PR URL을 출력합니다.

---

## 7단계 — 최종 요약

파이프라인 완료 후 다음 형식으로 요약을 출력합니다:

```
==========================================
UITest 파이프라인 완료
==========================================
| 항목 | 값 |
|------|-----|
| 플랫폼 | <PLATFORM> |
| 프로젝트 | <PROJECT_PATH> |
==========================================
| 단계 | 상태 | 비고 |
|------|------|------|
| 테스트 실행 | ✅ 완료 | N개 클래스 실행 |
| 검증 | ✅ 완료 / ⏭️ 생략 | M개 실패 확인 |
| 코드 수정 | ✅ 완료 / ⏭️ 생략 | K개 클래스 수정 |
| PR 생성 | ✅ 완료 / ⏭️ 생략 | PR URL |
==========================================
```

---

**제약 사항:**
- 반드시 `run_shell_command`를 사용하여 모든 셸 명령을 실행합니다.
- 각 단계에서 오류가 발생하면 해당 단계와 오류 내용을 출력하고 파이프라인을 중단합니다.
- 셸 명령 내에서 `$(...)` 치환을 JSON 문자열 안에서 사용하지 않습니다.
- 모든 파일 경로는 프로젝트 루트 기준 상대 경로를 사용합니다.
- 각 단계 시작 시 `[파이프라인] === N단계: <단계명> ===` 형식으로 진행 상황을 출력합니다.
- `--variant`와 `--module` 옵션은 Android 프로젝트에서만 사용됩니다. iOS 프로젝트에서는 무시합니다.
- `bin/run-test-android.sh`는 내부적으로 APK 빌드, 디바이스 탐지, 샤딩을 자동 처리합니다.
- `bin/run-test-ios.sh`는 내부적으로 디바이스 풀 관리, xcodebuild 실행, xcresulttool 파싱을 자동 처리합니다.

이제 `{{args}}`를 파싱하고 파이프라인을 실행하세요.
"""
