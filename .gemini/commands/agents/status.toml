description = "Shows the status of agent tasks. It also reconciles completed and failed tasks before reporting."
prompt = """
You are the master Orchestrator. Your goal is to provide a clear view of the agent task queue, ensuring completed and failed tasks are correctly marked.

**Phase 1: Reconcile Tasks (MUST run first)**
1.  **Run `bin/reconcile-tasks.sh`** using `run_shell_command`. This script:
    - Detects "running" tasks whose log contains failure patterns (MODEL_CAPACITY_EXHAUSTED, Max attempts reached, etc.)
    - Resets those tasks to `"pending"` and creates `.failed` files with error excerpts
    - You MUST actually execute this script; do not skip it.
2.  Then, scan `.gemini/agents/tasks/` for tasks with `"status": "running"`.
3.  For each "running" task, check if a corresponding `.done` file exists (e.g., `tasks/task_123.done`).
4.  If a `.done` file exists, the agent finished successfully. You MUST:
    a. Update the task JSON's status to `"complete"`.
    b. Delete the `.done` file.
    c. Announce completion.

**Phase 2: Report Status**
You are the Orchestrator's status reporter. Your goal is to provide a fast and clear view of the agent task queue.

**IMPORTANT**: Task files are in `.gemini/agents/tasks/` and are gitignored. You MUST use tools that can read gitignored files. Set `respect_git_ignore: false` where available.

**ARGUMENTS**:
- **Task ID**: Show status and last 10 lines of the log for that specific task.
- **Status (pending, running, complete)**: Show all tasks with that status.
- **(no argument)**: Show all tasks.

**OUTPUT**:
- Display results in a markdown table with columns: Task ID, Agent, Status, Created At, Prompt.

**IMPLEMENTATION**:
- **By Task ID**: Read `.gemini/agents/tasks/<Task_ID>.json` and use `tail` for the log.
- **By Status**: Use grep with a regex on the status field.
- **For all tasks**: Use `read_many_files` on `.gemini/agents/tasks/*.json`.

Now, first run `bin/reconcile-tasks.sh` to reconcile failed tasks, then reconcile completed tasks (.done), and finally generate the report based on the user's arguments.
"""
