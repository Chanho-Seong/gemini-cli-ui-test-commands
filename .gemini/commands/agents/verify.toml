description = "테스트 결과에서 실패 클래스별 verifier-agent 태스크를 생성합니다: /agents:verify <uitest_results.json | shard_log_dir>"
prompt = """
당신은 오케스트레이터의 **검증 태스크 생성기**입니다. 테스트 결과 파일(JSON 또는 shard 로그 디렉토리)을 읽어 실패한 테스트 클래스별로 verifier-agent 태스크를 생성하는 것이 역할입니다.

**중요: 반드시 `run_shell_command` 도구를 사용하여 모든 셸 명령을 실행해야 합니다. 명령어를 텍스트로만 출력하지 마세요 — 반드시 실행하세요.**

**사용자 인자:** `{{args}}` 또는 `{{arg0}}`

---

## 1단계 — 입력 판별, 플랫폼 감지 및 결과 파일 확보

`{{args}}`에서 입력 경로를 파싱합니다. 입력 유형에 따라 처리 방식이 다릅니다:

**A. JSON 파일인 경우** (경로가 `.json`으로 끝남):
- `run_shell_command`로 `cat <path>` 실행하여 JSON 내용을 읽습니다.
- 파일이 존재하지 않으면 "파일을 찾을 수 없습니다: <path>" 출력 후 중단합니다.

**B. 디렉토리인 경우** (`.json`으로 끝나지 않음):
- 먼저 shard 로그 파싱을 실행합니다:
  ```shell
  python3 bin/parse-am-instrument-results.py --shard-dir <path> --output-dir .gemini/agents/logs
  ```
- 파싱이 완료되면 생성된 결과 파일을 읽습니다:
  - `.gemini/agents/logs/all_uitest_results.json` 파일이 생성되었는지 확인
  - 또는 `.gemini/agents/logs/*_uitest_results.json` 파일들을 탐색
  ```shell
  cat .gemini/agents/logs/all_uitest_results.json
  ```
- shard 로그가 없거나 파싱에 실패하면 오류 메시지를 출력하고 중단합니다.

**플랫폼 감지:**
`.gemini/agents/workspace/` 하위 프로젝트 디렉터리를 스캔하여 플랫폼을 판별합니다:
- `build.gradle`, `build.gradle.kts` 파일이 존재하면 → **Android**
- `.xcodeproj`, `.xcworkspace` 파일이 존재하면 → **iOS**
- JSON 결과 파일에 `platform` 필드가 있으면 해당 값을 우선 사용합니다.
- 판별된 플랫폼 값(`Android` 또는 `iOS`)을 이후 프롬프트 생성 시 `<PLATFORM>`으로 사용합니다.

## 2단계 — 실패 클래스 및 테스트 메서드 추출

읽어들인 JSON에서 `failedTests` 배열을 분석합니다:

1. `failedTests` 배열에서 고유한 `className` 값들을 추출합니다.
2. 각 className별로 해당되는 실패 테스트의 `methodName`(테스트 케이스 이름) 목록을 수집합니다.
3. `failedTests`가 비어 있거나 존재하지 않으면 "실패한 테스트가 없습니다. 검증이 필요하지 않습니다." 출력 후 중단합니다.

## 3단계 — 클래스별 verifier-agent 태스크 생성

추출된 각 고유 className에 대해 하나의 verifier-agent 태스크를 생성합니다:

3-1. **Task ID 생성**:
  - 첫 번째 클래스: `task_<unix_timestamp>_verify_0`
  - 이후 클래스: 접미사 증가 (`_verify_1`, `_verify_2`, ...)
  - Unix timestamp는 리터럴 값을 사용합니다. `$(...)` 치환을 사용하지 마세요.

3-2. **verifier-agent 프롬프트 구성** (한국어):

프롬프트에는 결과 파일 경로 대신, 2단계에서 추출한 **실패 테스트 케이스 이름(methodName) 목록을 직접 포함**합니다.

```
당신은 verifier-agent입니다. Task ID는 <TASK_ID>입니다.

플랫폼: <PLATFORM>
테스트 클래스 "<CLASS_NAME>"의 다음 테스트 케이스들이 실패했습니다. 실제 디바이스에서 검증하세요.

실패 테스트 케이스:
- <METHOD_NAME_1>
- <METHOD_NAME_2>
- <METHOD_NAME_3>
...

검증 절차:
1. 워크스페이스에서 "<CLASS_NAME>" 테스트 소스 코드 파일을 찾아 읽으세요.
2. 위에 나열된 각 실패 테스트 케이스의 소스 코드를 분석하여 테스트 시나리오(사전 조건, 실행 단계, 기대 결과)를 파악하세요.
3. 파악한 시나리오를 기반으로 테스트별 체크리스트를 작성하여 planFile(<PLAN_FILE_PATH>)에 기록하세요. 체크리스트는 각 테스트의 단계별 검증 항목을 포함해야 합니다.
4. planFile에 기록한 체크리스트에 따라 mobile-mcp 도구를 사용하여 실제 디바이스에서 각 시나리오를 순서대로 재현하세요.
5. 동일한 기능적 목표를 다른 경로로 달성할 수 있다면 PASSED로 판정하세요.
6. 결과를 .gemini/agents/logs/<TASK_ID>_device_verification.json에 기록하세요.
7. 완료 시 .gemini/agents/tasks/<TASK_ID>.done 파일을 생성하세요.
```

3-3. **태스크 JSON 작성**:
```shell
echo '{"taskId":"<TASK_ID>","status":"pending","agent":"verifier-agent","prompt":"<PROMPT>","planFile":".gemini/agents/plans/<TASK_ID>_plan.md","logFile":".gemini/agents/logs/<TASK_ID>.log","createdAt":"<ISO_TIMESTAMP>"}' > .gemini/agents/tasks/<TASK_ID>.json
```

3-4. **Plan 파일 작성**:
```shell
echo '# Plan for verifier-agent - <CLASS_NAME> 실패 테스트 검증' > .gemini/agents/plans/<TASK_ID>_plan.md
```

## 4단계 — 결과 요약

모든 태스크 생성이 완료되면 마크다운 테이블을 출력합니다:

| Task ID | 플랫폼 | 대상 클래스 | 실패 테스트 케이스 | 상태 |
|---------|--------|------------|-------------------|------|
| task_..._verify_0 | Android | kr.co.example.SomeTest | testA, testB, testC | pending |
| task_..._verify_1 | Android | kr.co.example.OtherTest | testX, testY | pending |

그 후 다음 단계를 안내합니다:
- 검증 태스크 실행: `/agents:run-all verifier-agent`
- 상태 확인: `/agents:status`

